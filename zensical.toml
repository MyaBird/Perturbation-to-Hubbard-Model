[project]
site_name = "Perturbation to Hubbard Model"
site_url = "https://MyaBird.github.io/Perturbation-to-Hubbard-Model/"
repo_url = "https://github.com/MyaBird/Perturbation-to-Hubbard-Model"
repo_name = "MyaBird/Perturbation-to-Hubbard-Model"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Usage" = "usage.md" },
  { "API Reference" = "api.md" },
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
